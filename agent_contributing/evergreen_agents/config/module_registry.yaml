    keeper_skills: [flutter, dart, html-parsing, cache, api]
    depends_on: [auth]
    depended_by: [courses, scores, exams, todo, scheduler]
    test_path: "test/features/zdbk"
    contracts:
      - {to: "courses", interface: "Course Data"}
      - {to: "scores", interface: "Grade Data"}
      - {to: "exams", interface: "Exam Data"}

