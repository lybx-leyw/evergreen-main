# Evergreen Module Registry — 实时代码模块映射
# 每个模块对应一个 Module Keeper Agent
# 由 bootstrap 加载 → 创建 Agent 实例

modules:
  # ==========================================================================
  # 基础层 (Foundation) — 被其他模块依赖的核心服务
  # ==========================================================================
  auth:
    name: "认证服务"
    path: "lib/features/auth"
    section: foundation
    status: active
    description: "ZJU SSO 统一认证，提供登录/登出/cookie管理"
    keeper_skills: [flutter, dart, oauth, cookie]
    depends_on: []
    depended_by: [courses, todo, plan, scores, exams, downloads, classroom, zdbk, pintia, library, ecard, autosign, rvpn, settings]
    test_path: "test/features/auth"
    contracts: []

  agent:
    name: "AI 助手"
    path: "lib/features/agent"
    section: ai_tools
    status: active
    description: "应用内 AI Agent 运行时，工具注册表，会话管理"
    keeper_skills: [flutter, dart, llm, agent, tool-system]
    depends_on: []
    depended_by: [palace]
    test_path: "test/features/agent"
    contracts: [{to: "core_agent", interface: "Agent Tool Registry"}]

