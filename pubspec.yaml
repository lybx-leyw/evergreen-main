name: evergreen_multi_tools
description: Evergreen Multi-Tool Integrated Version — 学在浙大 · 智云课堂 · 图书馆 · AI笔记 · 智能调度 · 成绩追踪 · 一卡通
publish_to: 'none'
version: 1.1.0+1
# License inherited from upstream ZJU-live-better (GPL-3.0-only)
# See ATTRIBUTION.md for full licensing and attribution details

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.6.1

  # Routing
  go_router: ^14.8.1

  # HTTP
  dio: ^5.9.2
  dio_cookie_manager: ^3.2.0
  cookie_jar: ^4.0.8

  # Storage
  drift: ^2.21.0
  sqlite3_flutter_libs: ^0.5.0
  shared_preferences: ^2.3.0
  path_provider: ^2.1.0

  # Desktop
  window_manager: ^0.4.0

  # Video — media_kit for cross-platform playback
  media_kit: ^1.2.6
  media_kit_video: ^2.0.1
  media_kit_libs_video: ^1.0.7

  # UI
  fl_chart: ^0.69.0
  google_fonts: ^6.2.1
  flutter_markdown: ^0.7.6
  flutter_math_fork: ^0.7.0
  markdown: ^7.0.0

  # HTML rendering
  flutter_widget_from_html_core: ^0.15.0

  # Syntax highlighting for code blocks
  flutter_highlight: ^0.7.0


  # Diagrams
  flutter_mermaid: ^0.1.0

  # File picker
  file_picker: ^8.0.0

  # On-device OCR (Android/iOS)
  google_mlkit_text_recognition: ^0.13.0

  # PDF rendering (PDFium FFI, all platforms)
  pdfrx: ^1.0.12

  # Utilities
  uuid: ^4.5.0
  intl: ^0.19.0
  crypto: ^3.0.0
  pointycastle: ^3.9.0
  path: ^1.9.0
  yaml: ^3.1.0
  webview_flutter: ^4.13.1
  webview_flutter_platform_interface: ^2.15.1
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

dependency_overrides:
  audio_video_progress_bar: ^2.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/prompts/
    - assets/icons/
    - assets/data/
    - .greenix/skills/
